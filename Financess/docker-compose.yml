# Ficheiro: docker-compose.yml
version: "3.9"

services:
  # ----------------------------------------
  # 1. SERVIÇO BACKEND (FLASK)
  # ----------------------------------------
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: flask_app
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      FLASK_APP: app.py
      FLASK_DEBUG: 1
      # O Python vai usar esta URL para se ligar à base de dados
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    command: python app.py

  # ----------------------------------------
  # 2. SERVIÇO FRONTEND (REACT/VITE)
  # ----------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: financess_react
    working_dir: /app
    volumes:
      - ./frontend:/app # Mapeia a pasta do frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Garante o hot-reload (atualização em tempo real)
    # Script que verifica se o projeto já existe. Se não, instala o React automaticamente!
    command: >
      sh -c "
      if [ ! -f package.json ]; then
        echo '--- Criando novo projeto React/Vite ---';
        npx --yes create-vite@latest . --template react;
      fi;
      echo '--- Instalando dependencias ---';
      npm install;
      echo '--- Iniciando servidor React ---';
      npm run dev -- --host
      "

  # ----------------------------------------
  # 3. SERVIÇO BASE DE DADOS (POSTGRESQL)
  # ----------------------------------------
  db:
    image: postgres:16-alpine
    container_name: financess_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - dbdata:/var/lib/postgresql/data # Persistência de dados (não perde os dados se o contentor parar)
    ports:
      - "5433:5432"

  # ----------------------------------------
  # 4. GESTOR DE BASE DE DADOS (ADMINER)
  # ----------------------------------------
  adminer:
    image: adminer
    container_name: financess_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  dbdata: # Declaração do volume nomeado para a base de dados